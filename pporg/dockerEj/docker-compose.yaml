services:

  db:
    image: mysql:latest
    container_name: prog_db
    restart: always
    environment:
      MYSQL_DATABASE: ejemplo # nombre de la base de datos
      MYSQL_ROOT_PASSWORD: root # trabajaremos de momento con el usuario root
      MYSQL_USER: usuario
      MYSQL_PASSWORD: clave
    ports:
      - "3306:3306" # puerto equipo:puerto contenedor
    
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: prog_phpmyadmin
    restart: always # reinicia siempre el servicio
    environment:
      PMA_HOST: db # nombre del servicio de bases de datos
      MYSQL_ROOT_PASSWORD: root
      PMA_PORT: 3306
    ports:
      - "8080:80" # puerto equipo:puerto contenedor (en un servicio phpmyadmin siempre será el 80)
    depends_on:
      - db 